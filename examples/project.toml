# Example Project Configuration
# Usage: mdmix create project -f project.toml

[project]
name = "kinase_binding_sites"
description = "Binding site analysis of protein kinase using MSMD"
author = "Your Name"

[defaults]
# Default simulation parameters for all replicas
temperature = 300.0
nanos = 20
md_program = "AMBER"
production_ensemble = "NVT"

# Default solvents to use
solvents = ["ETA", "MAM"]

# Number of replicas per solvent
replicas_per_solvent = 3

[paths]
# Project directory structure
systems = "systems"
replicas = "replicas"
analysis = "analysis"
grids = "grids"
hotspots = "hotspots"

[analysis]
# Default analysis parameters
grid_spacing = 0.5
energy_cutoff = -0.5
cluster_distance = 2.0

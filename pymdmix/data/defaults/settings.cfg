## pyMDMix default global settings
## User overrides: ~/.mdmix/settings.cfg
##
## Type prefixes: int-, float-, bool-, list-
## Example:  int-param = 10   →  int variable with value 10
##           list-items = a, b →  list ['a', 'b']

[GENERAL]
## Debug flag (0 = off, 1 = on)
int-DEBUG = 0

## Available simulation programs
list-AVAIL_MDPROG = OPENMM, AMBER, NAMD

## Solvation buffer (Angstroms)
float-AMBER_SOLVATE_BUFFER = 14.0

## Grid spacing (Angstroms)
float-GRID_SPACING = 0.5

## Recognised grid type names
list-GRIDTYPES = MDMIX_DENS,MDMIX_CORR,MDMIX_RAW,MDMIX_OTHER,MDMIX_UNK,MDMIX_PART_DENS,MDMIX_RAW_AVG

## Probe-averaged output folder/prefix
AVGOUTPATH = PROBE_AVG
AVGOUTPREFIX = avg_

## Default water model
DEF_AMBER_WATBOX = TIP3P

## Default solvation buffer
float-DEF_AMBER_BUFFER = 14.0

## Use cubic box?  1 = cubic, 0 = orthorhombic
int-DEF_AMBER_CUBICBOX = 0

## Default number of replicas
int-DEF_NREPLICAS = 1

## Completion markers in MD output files
AMBER_MIN_COMPLETE = Maximum number of minimization cycles reached.
AMBER_MD_COMPLETE = Total CPU time:
NAMD_FILE_COMPLETE = End of program

## Default force-field files loaded with tLeap
list-DEF_AMBER_FF = leaprc.protein.ff19SB, leaprc.gaff

## Recognised trajectory extensions
list-avail_trajext = nc, netcdf, x, x.gz, dcd

[BINARIES]
## Executables (absolute paths or names on PATH)
AMBER_TLEAP = tleap
AMBER_PTRAJ = cpptraj
AMBER_PROD_EXE = pmemd.cuda
AMBER_MIN_EXE = pmemd.cuda
AMBER_AMBPDB = ambpdb
NAMD_EXE = namd2
OPENMM_EXE = python

## pyMDMix default MD simulation settings
## User overrides: ~/.mdmix/md-settings.cfg
##
## Type prefixes: int-, float-, bool-, list-
## Keys here use the legacy names accepted by MDSettingsConfigFileParser.
## They are mapped to the corresponding MDSettings dataclass fields.

[GENERAL]
## Production length (nanoseconds)
int-nanos = 20

## Simulation temperature (Kelvin)
float-temp = 300.0

## MD timestep (femtoseconds)
float-md_timestep = 2.0

## Restraint scheme: FREE, HA (heavy atoms), BB (backbone)
restrMode = FREE

## Restraint force constant (kcal/mol·Å²)
float-restrForce = 0.0

## Default simulation program: AMBER, NAMD, OPENMM, GROMACS
mdProgram = AMBER

## Production ensemble: NVT or NPT
production_ensemble = NVT

## Trajectory write frequency (steps; 500 steps = 1000 frames/ns at 2 fs)
int-trajfrequency = 500

## Minimisation steps
int-minsteps = 5000

## Heating steps (100 000 = 200 ps at 2 fs)
int-heating_steps = 100000

## NPT equilibration steps (500 000 = 1 ns at 2 fs)
int-npt_eq_steps = 500000

## Steps per production file (500 000 = 1 ns at 2 fs)
int-prod_steps = 500000

## Initial heating temperature (Kelvin)
float-parm_heating_tempi = 100.0

## Target NPT pressure (bar)
float-npt_pressure = 1.0

## Write trajectory in NetCDF format (1) or ASCII (0)
int-mdnetcdf = 1

## Coordinate wrapping (IWRAP): 1 = on, 0 = off
int-iwrap = 1

## Use output of minimisation as positional restraint reference (0 = use input CRD)
int-minimizationAsRef = 0

## Force-field files loaded with tLeap
list-FF = leaprc.protein.ff14SB, leaprc.gaff

## ----- Folder names -----
mdfolder = md
eqfolder = eq
minfolder = min
alignfolder = align
densityfolder = dgrids
energyfolder = egrids

## ----- File name templates -----
## Must contain {step} and {extension} placeholders.
mdoutfiletemplate = md{step}.{extension}
eqoutfiletemplate = eq{step}.{extension}

## ----- Recognised trajectory extensions -----
list-avail_trajext = nc, netcdf, x, x.gz, dcd

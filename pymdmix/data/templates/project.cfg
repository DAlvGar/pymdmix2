# pyMDMix2 Project Configuration File
# =====================================
# This single file drives the full project setup workflow:
#
#   pymdmix create project -n myproject -f project.cfg
#
# It contains two mandatory sections:
#   [SYSTEM]     – the biological system to simulate
#   [MDSETTINGS] – solvent mixtures, replica counts and simulation parameters
#
# Copy and edit this template, then pass it to pymdmix.
# You can generate a fresh copy at any time:
#
#   pymdmix create template            # saves project.cfg to current folder
#   pymdmix create template -o /path/  # saves to a specific path

# =============================================================================
# SYSTEM SECTION
# =============================================================================

[SYSTEM]

# ---- System identifier (mandatory) -----------------------------------------
NAME = MyProtein

# ---- Input structure (one of OFF or PDB is mandatory) ----------------------
# Path to Amber Object File (.off or .lib) produced by tLeap.
# This is the recommended input — it embeds force-field parameters.
OFF = myprotein.off

# Alternative: provide a PDB file (force-field assignment via tLeap).
# PDB = myprotein.pdb

# ---- Unit name inside the OFF file (optional) ------------------------------
# Only needed if the OFF file contains more than one unit.
# UNAME = MyProtein

# ---- Non-standard residues (optional) -------------------------------------
# Comma-separated list of residue names that belong to the solute
# (not to the solvent). Needed for correct mask auto-detection.
# EXTRARES = LIG, ACE, NME

# ---- Extra force-field files (optional) -----------------------------------
# Comma-separated list of leaprc / frcmod files required to parameterise
# non-standard residues (include absolute paths if outside AMBERHOME).
# EXTRAFF = leaprc.gaff, ligand.frcmod


# =============================================================================
# MD SETTINGS SECTION
# =============================================================================

[MDSETTINGS]

# ---- Solvents (mandatory) -------------------------------------------------
# Comma-separated list of solvent-box names available in the library.
# Run  pymdmix info solvents  to list installed solvents.
# Examples: ETA (20 % ethanol), MAM (20 % acetamide), WAT (pure water)
SOLVENTS = ETA, MAM, WAT

# ---- Number of replicas (optional, default: 1) ----------------------------
# One integer → same count for all solvents.
# Per-solvent override: NREPL = 3, WAT:1
NREPL = 3

# ---- Production length in nanoseconds (optional, default: 20) -------------
# Per-replica override: NANOS = 20, WAT//10
NANOS = 20

# ---- Simulation temperature in Kelvin (optional, default: 300) ------------
TEMP = 300

# ---- Restraint scheme (optional, default: FREE) ---------------------------
# Options: FREE (no restraints), HA (heavy atoms), BB (backbone only)
# Per-replica override: RESTR = HA, WAT//FREE
RESTR = FREE

# ---- Restraint force constant (optional, default: 0.0 kcal/mol·Å²) -------
# Relevant when RESTR != FREE.
# FORCE = 0.5

# ---- Restraint residue mask (optional, default: auto) ---------------------
# Amber-style mask; 'auto' = all protein heavy atoms.
# RESTRMASK = auto

# ---- Alignment mask (optional, default: same as RESTRMASK) ----------------
# Residue mask used when aligning trajectories for analysis.
# ALIGNMASK = auto


# ---- Settings overrides (optional) ----------------------------------------
# Any key present in data/defaults/md-settings.cfg can be overridden here.
# Common overrides:

# Write a snapshot every N steps (default: 500 → 1000 frames/ns at 2 fs)
# TRAJFREQUENCY = 500

# Production steps per trajectory file (default: 500000 = 1 ns at 2 fs)
# PROD_STEPS = 500000

# NPT equilibration steps (default: 500000 = 1 ns at 2 fs)
# NPT_EQ_STEPS = 500000

# MD timestep in femtoseconds (default: 2.0)
# MD_TIMESTEP = 2.0

# MD engine: AMBER, OPENMM, NAMD, GROMACS (default: AMBER)
# MDPROGRAM = AMBER

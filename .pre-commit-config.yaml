repos:
  # ---------------------------------------------------------------------------
  # Basic file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------------------------------------------------------------------
  # Ruff – linting + formatting (replaces flake8, isort, pyupgrade, etc.)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy – static type checking (runs in the local venv so stubs are available)
  # Run manually: uv run pre-commit run mypy --hook-stage manual
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: ["pymdmix", "--ignore-missing-imports"]
        files: ^pymdmix/
        pass_filenames: false
        stages: [manual]
